name: 🎬 توليد فيديو رياضي مصري

on:
  workflow_dispatch:
  push:
    paths:
      - 'topic.txt'
  schedule:
    - cron: '0 */6 * * *'  # كل 6 ساعات

jobs:
  generate-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 سحب الكود
        uses: actions/checkout@v4

      - name: 🐍 تنصيب بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 تنزيل المكتبات
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core python3-pil
          pip install gTTS moviepy pillow numpy requests

      - name: 🤖 تشغيل سكريبت التوليد
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python generate_video.py

      - name: 📤 رفع الفيديو الناتج
        uses: actions/upload-artifact@v4
        with:
          name: egyptian-sports-video-${{ github.run_number }}
          path: final/final_video.mp4
          retention-days: 7

      - name: 💾 حفظ في المستودع
        run: |
          mkdir -p generated_videos
          cp final/final_video.mp4 generated_videos/video_$(date +%Y%m%d_%H%M%S).mp4
          git config user.name "Video Bot"
          git config user.email "bot@example.com"
          git add generated_videos/ ../topic.txt
          git commit -m "🎥 فيديو جديد: $(date)" || echo "لا تغييرات"
          git push || echo "خطأ في الرفع"
